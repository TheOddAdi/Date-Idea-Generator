<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Date Generator">
    <meta name="theme-color" content="#ff4d8d">
    <link rel="manifest" href="manifest.json">
    <title>Date Generator</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="card" style="--i:0">
            <h1>Date Generator ❤️</h1>
            <p class="small">Make a quick plan for a date that fits your vibe.</p>

            <div class="filters-grid">
                <label>
                    Budget
                    <select id="budgetFilter">
                        <option value="">Any</option>
                        <option value="$">$</option>
                        <option value="$$">$$</option>
                        <option value="$$$">$$$</option>
                    </select>
                </label>

                <label>
                    Duration
                    <select id="durationFilter">
                        <option value="">Any</option>
                        <option value="under-1hr">&lt;1hr</option>
                        <option value="1-2hrs">1-2hrs</option>
                        <option value="2plus-hrs">2+hrs</option>
                    </select>
                </label>

                <label>
                    Setting
                    <select id="settingFilter">
                        <option value="">Any</option>
                        <option value="indoor">Indoor</option>
                        <option value="outdoor">Outdoor</option>
                    </select>
                </label>

                <label>
                    Location
                    <div class="location-toggle" role="group" aria-label="Location selection">
                        <button type="button" class="toggle-btn" data-location="cincinnati">Cincinnati</button>
                        <button type="button" class="toggle-btn" data-location="columbus">Columbus</button>
                    </div>
                </label>
            </div>

            <div class="actions">
                <button id="generateBtn">Generate Date</button>
                <button id="clearFiltersBtn" class="secondary">Clear</button>
            </div>
        </div>

        <div class="card" style="--i:1">
            <div id="result">Tap generate to get a fresh date idea.</div>
        </div>

        <button id="manageBtn" class="secondary manage-btn" style="--i:2">Manage ideas</button>
    </div>

    <div id="manageModal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Manage ideas">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Manage ideas</h2>
                <button id="closeManageModal" class="icon-btn">Close</button>
            </div>

            <div class="tab-row">
                <button class="tab-btn active" data-tab="restaurants">Restaurants</button>
                <button class="tab-btn" data-tab="activities">Activities</button>
                <button class="tab-btn" data-tab="desserts">Desserts</button>
            </div>

            <div class="manage-section">
                <div id="editStatus" class="small"></div>
                <div class="form-grid">
                    <label>
                        Name
                        <input id="itemName" type="text" placeholder="e.g. Picnic in the park">
                    </label>
                    <label id="budgetField">
                        Budget
                        <select id="itemBudget">
                            <option value="$">$</option>
                            <option value="$$">$$</option>
                            <option value="$$$">$$$</option>
                        </select>
                    </label>
                    <label id="durationField">
                        Duration
                        <select id="itemDuration">
                            <option value="under-1hr">&lt;1hr</option>
                            <option value="1-2hrs">1-2hrs</option>
                            <option value="2plus-hrs">2+hrs</option>
                        </select>
                    </label>
                    <label id="settingField">
                        Setting
                        <select id="itemSetting">
                            <option value="">Any</option>
                            <option value="indoor">Indoor</option>
                            <option value="outdoor">Outdoor</option>
                            <option value="both">Both</option>
                        </select>
                    </label>
                    <label id="locationField">
                        Location
                        <div class="location-toggle small-toggle" role="group" aria-label="Idea location selection">
                            <button type="button" class="toggle-btn" data-item-location="cincinnati">Cincinnati</button>
                            <button type="button" class="toggle-btn" data-item-location="columbus">Columbus</button>
                            <button type="button" class="toggle-btn" data-item-location="both">Both</button>
                        </div>
                    </label>
                </div>
                <button id="addItemBtn">Add idea</button>
                <div id="dbSpinner" class="db-spinner hidden" role="status" aria-label="Saving to database">Saving…
                </div>
            </div>

            <div class="manage-section">
                <h3>Saved ideas</h3>
                <ul id="manageList" class="manage-list"></ul>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>>
